name: flashmeup
description: "FlashMeUp — offline-first flashcard"
publish_to: 'none'

version: 0.0.2+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.3
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_markdown: ^0.7.7
  uuid: ^4.5.3
  shared_preferences: ^2.3.5
  share_plus: ^10.0.3
  path_provider: ^2.1.4
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
